<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:360px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f0f13;color:#e0e0e0;padding:16px}
  .hdr{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #2a2a3e}
  .hdr h1{font-size:16px;font-weight:600}
  .status{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;margin-bottom:12px;font-size:13px}
  .status.ok{background:#00b89422;color:#00b894;border:1px solid #00b89444}
  .status.err{background:#e1705522;color:#e17055;border:1px solid #e1705544}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.g{background:#00b894}.dot.r{background:#e17055}
  .sec{margin-bottom:14px}
  .sec-t{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .row label{font-size:12px;color:#aaa;min-width:56px}
  input,select{flex:1;background:#12121a;border:1px solid #333;border-radius:6px;padding:6px 10px;color:#e0e0e0;font-size:12px;outline:none}
  input:focus{border-color:#6c5ce7}
  .btn{width:100%;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px}
  .btn:hover{opacity:.85}
  .bp{background:#6c5ce7;color:#fff}.bs{background:#2a2a3e;color:#aaa}
  .hi{padding:8px 10px;background:#1a1a2e;border-radius:6px;margin-bottom:6px;border:1px solid #2a2a3e}
  .hi-t{font-size:12px;font-weight:600;color:#fff}
  .hi-m{font-size:11px;color:#666;margin-top:2px}
  .badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600}
  .be{background:#00b89422;color:#00b894}.bm{background:#fdcb6e22;color:#fdcb6e}.bh{background:#e1705522;color:#e17055}
  .empty{text-align:center;padding:20px;color:#555;font-size:13px}
  .ft{font-size:11px;color:#444;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="hdr"><h1>LeetCode Notebook Sync</h1></div>
<div id="st" class="status err"><span class="dot r"></span><span>Checking Ollama...</span></div>
<div class="sec">
  <div class="sec-t">Settings</div>
  <div class="row"><label>Ollama URL</label><input id="url" value="http://localhost:11434"/></div>
  <div class="row"><label>Model</label><input id="mdl" value="llama3.2"/></div>
  <button class="btn bs" id="save">Save Settings</button>
</div>
<div class="sec"><button class="btn bp" id="sync">Sync Current Page</button><div style="font-size:11px;color:#666;text-align:center">Use on a LeetCode problem page</div></div>
<div class="sec"><div class="sec-t">Recent Syncs</div><div id="hist"><div class="empty">No syncs yet</div></div></div>
<div class="ft">Auto-syncs on AC &middot; Ollama local analysis</div>
<script>
async function chk(){
  const u=document.getElementById("url"),s=document.getElementById("st");
  try{const r=await fetch(u.value+"/api/tags");if(r.ok){const d=await r.json();const m=d.models?.map(x=>x.name).join(", ")||"none";s.className="status ok";s.innerHTML='<span class="dot g"></span><span>Connected — models: '+m+"</span>";}else throw 0;}
  catch{s.className="status err";s.innerHTML='<span class="dot r"></span><span>Not connected — make sure Ollama is running</span>';}
}
chrome.storage.local.get(["config"],d=>{if(d.config){if(d.config.ollamaUrl)document.getElementById("url").value=d.config.ollamaUrl;if(d.config.ollamaModel)document.getElementById("mdl").value=d.config.ollamaModel;}chk();});
document.getElementById("save").onclick=()=>{chrome.runtime.sendMessage({type:"UPDATE_CONFIG",config:{ollamaUrl:document.getElementById("url").value,ollamaModel:document.getElementById("mdl").value}},()=>chk());};
document.getElementById("sync").onclick=async()=>{const b=document.getElementById("sync");b.textContent="Syncing...";b.disabled=true;try{const[t]=await chrome.tabs.query({active:true,currentWindow:true});if(!t?.url?.includes("leetcode")){alert("Open a LeetCode problem page first");return;}chrome.tabs.sendMessage(t.id,{type:"MANUAL_SYNC"});b.textContent="Triggered!";}catch{b.textContent="Failed";}finally{setTimeout(()=>{b.textContent="Sync Current Page";b.disabled=false;},2000);}};
function loadHist(){chrome.storage.local.get(["syncHistory"],d=>{const l=document.getElementById("hist"),h=(d.syncHistory||[]).slice(0,8);if(!h.length){l.innerHTML='<div class="empty">No syncs yet</div>';return;}l.innerHTML=h.map(i=>{const dc=i.difficulty==="Easy"?"be":i.difficulty==="Hard"?"bh":"bm";const t=new Date(i.submittedAt).toLocaleString("en",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});return`<div class="hi"><div class="hi-t">${i.title} <span class="badge ${dc}">${i.difficulty}</span></div><div class="hi-m">${i.category} &middot; ${t}</div></div>`;}).join("");});}
loadHist();chrome.storage.onChanged.addListener(c=>{if(c.syncHistory)loadHist();});
</script>
</body>
</html>
